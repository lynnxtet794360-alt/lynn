<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dashboard</title>
  <link rel="stylesheet" href="dashboard.css">
</head>

<body>

<!-- TOP BAR (mobile menu button) -->
<div class="topbar">
  <button class="menu-btn" onclick="toggleMenu()">☰</button>
  <h2>Dashboard</h2>
</div>

<!-- SIDEBAR -->
<div id="sidebar" class="sidebar">
  <h3>My App</h3>

  <button onclick="loadProfile()">Profile</button>
  <button onclick="loadStats()">Stats</button>
  <button onclick="logout()">Logout</button>
</div>

<!-- MAIN -->
<div class="main">
  <div class="card">
    <h3>User Info</h3>
    <p id="userInfo">Loading...</p>
  </div>

  <div class="card">
    <h3>Stats</h3>
    <p>Total Users: <span id="totalUsers">-</span></p>
  </div>
</div>

<script src="dashboard.js"></script>

</body>
</html>
