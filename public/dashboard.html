<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <!-- SIDEBAR -->
  <div class="sidebar" id="sidebar">
    <h2>My Panel</h2>

    <a href="#">🏠 Home</a>
    <a href="#">👤 Profile</a>
    <a href="#">📊 Stats</a>
    <a href="#">⚙️ Settings</a>

    <button onclick="logout()">Logout</button>
  </div>

  <!-- MAIN -->
  <div class="main">

    <button class="menu-btn" onclick="toggleMenu()">☰</button>

    <h1>Dashboard 📊</h1>

    <div class="cards">

      <div class="card">
        <h3>Total Users</h3>
        <p id="totalUsers">0</p>
      </div>

      <div class="card">
        <h3>Active Session</h3>
        <p>1</p>
      </div>

      <div class="card">
        <h3>Status</h3>
        <p>Online 🟢</p>
      </div>

    </div>

    <div class="box">
      <h2>User Info</h2>
      <p id="userInfo">Loading...</p>
    </div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
